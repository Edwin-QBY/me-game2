<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>賽博鬥蛐蛐 - 響應式全景適應版</title>
    <style>
        body {
            background-color: #1e1e1e;
            color: #ffffff;
            font-family: "Microsoft JhengHei", sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        h1 {
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
            margin-bottom: 10px;
            text-align: center;
        }

        /* 控制面板 */
        .control-panel {
            background-color: #2a2a2a;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            margin-bottom: 20px;
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label {
            font-size: 14px;
            color: #ccc;
        }

        input[type="number"] {
            width: 70px;
            background-color: #3e3e3e;
            border: 1px solid #555;
            color: white;
            padding: 5px;
            border-radius: 5px;
            text-align: center;
        }

        /* 縮放滑桿樣式 */
        input[type="range"] {
            cursor: pointer;
            width: 120px;
        }

        button {
            background-color: #ff4757;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        button:hover {
            background-color: #ff6b81;
            transform: scale(1.05);
        }

        /* 遊戲主區塊：支援響應式自動換行 */
        .main-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            width: 100%;
            max-width: 1400px;
            padding: 0 10px;
            box-sizing: border-box;
        }

        /* 戰術圖鑑 */
        .guide-panel {
            width: 250px;
            background-color: #2a2a2a;
            padding: 15px;
            border-radius: 10px;
            font-size: 14px;
            line-height: 1.6;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            box-sizing: border-box;
        }

        .guide-title {
            font-size: 16px;
            font-weight: bold;
            color: #ffd700;
            border-bottom: 1px solid #444;
            padding-bottom: 5px;
            margin-bottom: 10px;
        }

        /* 地圖縮放外包裝保護殼：防止縮放時排版塌陷 */
        #arenaWrapper {
            width: 650px;
            height: 500px;
            overflow: visible;
            display: flex;
            justify-content: flex-start;
            align-items: flex-start;
            transition: width 0.1s, height 0.1s;
        }

        /* 戰鬥舞台 */
        .arena {
            position: relative;
            width: 650px;
            height: 500px;
            background-color: #111;
            border: 3px solid #444;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
            transform-origin: top left; /* 確保從左上角等比例縮放 */
            transition: transform 0.1s;
        }

        /* 蛐蛐角色樣式 */
        .cricket {
            position: absolute;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 11px;
            font-weight: bold;
            color: white;
            user-select: none;
            transition: transform 0.1s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        /* 陣營顏色區分 */
        .faction-red { background: radial-gradient(circle, #ff4757, #b31020); border: 2px solid #ff6b81; }
        .faction-blue { background: radial-gradient(circle, #1e90ff, #0f52ba); border: 2px solid #70a1ff; }

        /* Boss 外觀強化 */
        .cricket.is-boss {
            border: 3px solid #ffd700 !important;
            box-shadow: 0 0 15px #ffd700, inset 0 0 10px rgba(255,215,0,0.5);
            animation: pulse 1.5s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.05); }
        }

        /* 皇冠圖標 */
        .crown {
            position: absolute;
            top: -18px;
            font-size: 16px;
        }

        /* 血條 */
        .hp-bar-container {
            position: absolute;
            bottom: -6px;
            width: 120%;
            height: 4px;
            background-color: #555;
            border-radius: 2px;
            overflow: hidden;
        }
        .hp-bar {
            height: 100%;
            background-color: #2ed573;
            width: 100%;
            transition: width 0.1s;
        }

        /* 飄字特效 */
        .floating-text {
            position: absolute;
            font-weight: bold;
            font-size: 16px;
            pointer-events: none;
            animation: floatUp 0.8s ease-out forwards;
            text-shadow: 1px 1px 2px black;
            z-index: 10;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-30px) scale(0.8); opacity: 0; }
        }

        /* 戰報日誌 */
        .log-panel {
            flex: 1;
            min-width: 300px;
            max-width: 450px;
            height: 500px;
            background-color: #2a2a2a;
            border-radius: 10px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            box-sizing: border-box;
        }

        .log-container {
            flex: 1;
            overflow-y: auto;
            background-color: #1a1a1a;
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 13px;
            line-height: 1.5;
        }

        .log-entry { margin-bottom: 6px; border-left: 3px solid #555; padding-left: 6px; }
        .log-red { border-color: #ff4757; color: #ff6b81; }
        .log-blue { border-color: #1e90ff; color: #70a1ff; }
        .log-system { border-color: #ffd700; color: #ffd700; font-weight: bold; }

        /* 煙火特效容器 */
        .firework {
            position: absolute;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            pointer-events: none;
            animation: explode 1s ease-out forwards;
        }

        @keyframes explode {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--x), var(--y)) scale(0); opacity: 0; }
        }
    </style>
</head>
<body>

    <h1>賽博鬥蛐蛐 👑 霸王降臨版</h1>

    <div class="control-panel">
        <div class="control-group">
            <label>紅軍數量 (每職業):</label>
            <input type="number" id="redCount" value="3" min="1" max="10">
        </div>
        <div class="control-group">
            <label>藍軍數量 (每職業):</label>
            <input type="number" id="blueCount" value="3" min="1" max="10">
        </div>
        <div class="control-group">
            <label>🎬 視角縮放: <span id="zoomVal">100%</span></label>
            <input type="range" id="zoomSlider" min="50" max="100" value="100" step="5" oninput="adjustZoom(this.value)">
        </div>
        <button onclick="initGame()">重新激戰！</button>
    </div>

    <div class="main-container">
        <div class="guide-panel">
            <div class="guide-title">⚔️ 職業與霸王圖鑑</div>
            <p><strong>🛡️ 戰士</strong>：血量高。受到傷害時有 20% 機率完全【格擋】。</p>
            <p><strong>🔮 法師</strong>：攻擊附帶【吸血】，將傷害的 40% 轉化為自身血量。</p>
            <p><strong>⚡ 刺客</strong>：移動極快。敵方血量低於 25% 時觸發【斬殺】直接秒殺。</p>
            <p><strong>🏹 射手 (新)</strong>：攻擊範圍超遠，且有 25% 機率觸發【雙倍暴擊】！</p>
            <div class="guide-title" style="color:#ffd700; margin-top:15px;">👑 陣營霸王 (Boss)</div>
            <p style="color:#fffae6;">每個陣營會隨機誕生一隻超級 Boss！擁有 3 倍血量、1.5 倍攻擊力與龐大的體型！</p>
        </div>

        <div id="arenaWrapper">
            <div class="arena" id="arena"></div>
        </div>

        <div class="log-panel">
            <div class="guide-title">📜 即時戰報</div>
            <div class="log-container" id="logContainer"></div>
        </div>
    </div>

    <script>
        const arena = document.getElementById('arena');
        const arenaWrapper = document.getElementById('arenaWrapper');
        const logContainer = document.getElementById('logContainer');
        
        let crickets = [];
        let gameInterval = null;
        let isGameOver = false;
        let currentScale = 1; // 記錄當前縮放比

        // 職業基礎屬性
        const CLASSES = {
            WARRIOR: { name: '戰士', hp: 160, atk: 12, speed: 2, range: 25, label: '🛡️' },
            MAGE:    { name: '法師', hp: 100, atk: 18, speed: 1.5, range: 45, label: '🔮' },
            ASSASSIN:{ name: '刺客', hp: 80,  atk: 22, speed: 3.5, range: 20, label: '⚡' },
            ARCHER:  { name: '射手', hp: 95,  atk: 14, speed: 2.2, range: 80, label: '🏹' }
        };

        // 視角動態調整函數
        function adjustZoom(val) {
            currentScale = val / 100;
            document.getElementById('zoomVal').innerText = val + '%';
            
            // 縮放地圖本體
            arena.style.transform = `scale(${currentScale})`;
            
            // 同步調整外部包裝殼的大小，讓右邊的戰報日誌可以完美貼合，不會留下一大片空白
            arenaWrapper.style.width = `${650 * currentScale}px`;
            arenaWrapper.style.height = `${500 * currentScale}px`;
        }

        // 偵測螢幕寬度自動初始化縮放（貼心自動防超界邏輯）
        function autoAdaptScreen() {
            const screenWidth = window.innerWidth;
            // 如果寬度小於常規桌機 (1250px)，自動切換到合適的縮放比例
            if (screenWidth < 1300) {
                const idealZoom = Math.max(50, Math.min(100, Math.floor((screenWidth - 550) / 6.5)));
                document.getElementById('zoomSlider').value = idealZoom;
                adjustZoom(idealZoom);
            } else {
                document.getElementById('zoomSlider').value = 100;
                adjustZoom(100);
            }
        }

        function addLog(text, type) {
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            entry.innerText = text;
            logContainer.appendChild(entry);
            logContainer.scrollTop = logContainer.scrollHeight;
        }

        function spawnFloatingText(x, y, text, color) {
            const e = document.createElement('div');
            e.className = 'floating-text';
            e.innerText = text;
            e.style.left = `${x}px`;
            e.style.top = `${y - 15}px`;
            e.style.color = color;
            arena.appendChild(e);
            setTimeout(() => e.remove(), 800);
        }

        function spawnFireworks(centerX, centerY) {
            const colors = ['#ffd700', '#ff4757', '#1e90ff', '#2ed573', '#ffa500'];
            for (let i = 0; i < 40; i++) {
                const f = document.createElement('div');
                f.className = 'firework';
                f.style.left = `${centerX}px`;
                f.style.top = `${centerY}px`;
                f.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * 100 + 30;
                f.style.setProperty('--x', `${Math.cos(angle) * distance}px`);
                f.style.setProperty('--y', `${Math.sin(angle) * distance}px`);
                
                arena.appendChild(f);
                setTimeout(() => f.remove(), 1000);
            }
        }

        function initGame() {
            clearInterval(gameInterval);
            arena.innerHTML = '';
            logContainer.innerHTML = '';
            crickets = [];
            isGameOver = false;

            const redCount = parseInt(document.getElementById('redCount').value) || 3;
            const blueCount = parseInt(document.getElementById('blueCount').value) || 3;

            addLog("⚡ 戰鬥準備開始！兩軍霸王已進駐戰場！", "system");

            createTeam('紅方', 'red', redCount, 50, 200);
            createTeam('藍方', 'blue', blueCount, 450, 200);

            gameInterval = setInterval(gameUpdate, 33);
        }

        function createTeam(factionName, factionType, countPerClass, baseX, baseY) {
            const classesList = Object.keys(CLASSES);
            let teamUnits = [];

            classesList.forEach(clsKey => {
                for(let i = 1; i <= countPerClass; i++) {
                    teamUnits.push({ clsKey, isBoss: false, name: `${factionName}.${CLASSES[clsKey].name}${i}號` });
                }
            });

            if(teamUnits.length > 0) {
                const bossIndex = Math.floor(Math.random() * teamUnits.length);
                teamUnits[bossIndex].isBoss = true;
                teamUnits[bossIndex].name = `👑【${factionName}不朽霸王】`;
            }

            teamUnits.forEach((unit, index) => {
                const template = CLASSES[unit.clsKey];
                
                let hp = template.hp;
                let atk = template.atk;
                let size = 20;

                if(unit.isBoss) {
                    hp = template.hp * 3;
                    atk = Math.round(template.atk * 1.5);
                    size = 38;
                }

                const rx = baseX + (index % 4) * 35 + Math.random() * 15;
                const ry = baseY + Math.floor(index / 4) * 45 + Math.random() * 15;

                const el = document.createElement('div');
                el.className = `cricket faction-${factionType}`;
                if(unit.isBoss) el.classList.add('is-boss');
                el.style.width = `${size}px`;
                el.style.height = `${size}px`;
                el.innerText = template.label;

                if(unit.isBoss) {
                    const crown = document.createElement('div');
                    crown.className = 'crown';
                    crown.innerText = '👑';
                    el.appendChild(crown);
                }

                const hpContainer = document.createElement('div');
                hpContainer.className = 'hp-bar-container';
                const hpBar = document.createElement('div');
                hpBar.className = 'hp-bar';
                hpContainer.appendChild(hpBar);
                el.appendChild(hpContainer);

                arena.appendChild(el);

                crickets.push({
                    id: Math.random(),
                    name: unit.name,
                    faction: factionType,
                    cls: unit.clsKey,
                    isBoss: unit.isBoss,
                    maxHp: hp,
                    hp: hp,
                    atk: atk,
                    speed: template.speed,
                    range: template.range,
                    size: size,
                    x: rx,
                    y: ry,
                    vx: (Math.random() - 0.5) * template.speed,
                    vy: (Math.random() - 0.5) * template.speed,
                    el: el,
                    hpBar: hpBar,
                    lastAttackTime: 0
                });
            });
        }

        function gameUpdate() {
            if (isGameOver) return;
            const now = Date.now();

            crickets.forEach(c => {
                if (c.hp <= 0) return;

                let closestEnemy = null;
                let minDist = 999999;

                crickets.forEach(enemy => {
                    if (enemy.faction !== c.faction && enemy.hp > 0) {
                        const dist = Math.hypot(enemy.x - c.x, enemy.y - c.y);
                        if (dist < minDist) {
                            minDist = dist;
                            closestEnemy = enemy;
                        }
                    }
                });

                if (closestEnemy) {
                    const angle = Math.atan2(closestEnemy.y - c.y, closestEnemy.x - c.x);
                    c.vx = Math.cos(angle) * c.speed;
                    c.vy = Math.sin(angle) * c.speed;

                    if (minDist <= (c.range + c.size/2 + closestEnemy.size/2)) {
                        c.vx = 0;
                        c.vy = 0;

                        if (now - c.lastAttackTime > 800) {
                            performAttack(c, closestEnemy);
                            c.lastAttackTime = now;
                        }
                    }
                }

                c.x += c.vx;
                c.y += c.vy;
                c.x = Math.max(0, Math.min(650 - c.size, c.x));
                c.y = Math.max(0, Math.min(500 - c.size, c.y));

                c.el.style.left = `${c.x}px`;
                c.el.style.top = `${c.y}px`;
            });

            crickets = crickets.filter(c => {
                if (c.hp <= 0) {
                    c.el.remove();
                    return false;
                }
                return true;
            });

            const redAlive = crickets.some(c => c.faction === 'red');
            const blueAlive = crickets.some(c => c.faction === 'blue');

            if (!redAlive || !blueAlive) {
                isGameOver = true;
                clearInterval(gameInterval);
                
                if (!redAlive && !blueAlive) {
                    addLog("💀 兩敗俱傷！戰場上沒有任何人活下來！", "system");
                } else {
                    const winner = redAlive ? "🔴 紅方軍團" : "🔵 藍方軍團";
                    addLog(`🎉 大局已定！ 恭喜 【${winner}】 獲得了最終的輝煌勝利！`, "system");
                    spawnFireworks(325, 250);
                }
            }
        }

        function performAttack(attacker, target) {
            let dmg = attacker.atk;
            let logEffect = "";
            let textColor = "#ff4757";

            if (attacker.cls === 'ARCHER' && Math.random() < 0.25) {
                dmg *= 2;
                logEffect += "【🎯雙倍暴擊!!】";
                textColor = "#ffa500";
            }

            if (target.cls === 'WARRIOR' && Math.random() < 0.20) {
                spawnFloatingText(target.x, target.y, "🛡️ 格擋", "#1e90ff");
                addLog(`🛡️ ${target.name} 展現完美防禦，格擋了 ${attacker.name} 的攻擊！`, target.faction);
                return;
            }

            if (attacker.cls === 'ASSASSIN' && (target.hp / target.maxHp) <= 0.25) {
                dmg = target.hp;
                logEffect += "【⚡瞬身斬殺!!】";
                textColor = "#ff003c";
            }

            target.hp -= dmg;
            if (target.hp < 0) target.hp = 0;

            target.hpBar.style.width = `${(target.hp / target.maxHp) * 100}%`;
            spawnFloatingText(target.x, target.y, `-${dmg} ${logEffect}`, textColor);

            if (attacker.cls === 'MAGE' && attacker.hp > 0) {
                const heal = Math.round(dmg * 0.4);
                attacker.hp = Math.min(attacker.maxHp, attacker.hp + heal);
                attacker.hpBar.style.width = `${(attacker.hp / attacker.maxHp) * 100}%`;
                spawnFloatingText(attacker.x, attacker.y, `+${heal} 🩸`, "#2ed573");
            }

            addLog(`⚔️ ${attacker.name} 狠狠痛擊了 ${target.name}，造成 ${dmg} 點傷害！${logEffect}`, attacker.faction);

            if (target.hp <= 0) {
                addLog(`🪦 慘烈！ ${target.name} 被擊潰陣亡了！`, target.faction);
            }
        }

        // 初始化載入
        window.onload = function() {
            autoAdaptScreen();
            initGame();
        };

        // 當使用者縮放瀏覽器視窗時，自動重算完美視角
        window.onresize = autoAdaptScreen;
    </script>
</body>
</html>
