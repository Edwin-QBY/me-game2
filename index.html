<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>極簡微型電子鬥蛐蛐模擬器</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #1e1e24;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            margin-bottom: 10px;
            color: #ffcc00;
            text-shadow: 0px 0px 10px rgba(255, 204, 0, 0.5);
        }

        /* 控制面板樣式 */
        #control-panel {
            background-color: #2a2a35;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-weight: bold;
        }

        .input-group label {
            margin-bottom: 5px;
            font-size: 14px;
        }

        .input-group.warrior label { color: #ff4d4d; }
        .input-group.mage label { color: #4da6ff; }
        .input-group.assassin label { color: #4dff4d; }

        input[type="number"] {
            width: 60px;
            padding: 8px;
            border: none;
            border-radius: 5px;
            background-color: #3b3b4f;
            color: white;
            text-align: center;
            font-size: 16px;
        }

        button {
            padding: 10px 25px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            background-color: #ffcc00;
            color: #1e1e24;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        button:hover {
            background-color: #ffe066;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        /* 戰場畫布 */
        #arena-container {
            position: relative;
        }

        canvas {
            background-color: #111116;
            border: 3px solid #3a3a4a;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }

        #status-display {
            margin-top: 10px;
            font-size: 18px;
            font-weight: bold;
            color: #aaa;
        }
    </style>
</head>
<body>

    <h1>賽博微型鬥蛐蛐大賽</h1>

    <div id="control-panel">
        <div class="input-group warrior">
            <label>戰士人數 (紅)</label>
            <input type="number" id="warriorCount" value="5" min="0" max="50">
        </div>
        <div class="input-group mage">
            <label>法師人數 (藍)</label>
            <input type="number" id="mageCount" value="5" min="0" max="50">
        </div>
        <div class="input-group assassin">
            <label>刺客人數 (綠)</label>
            <input type="number" id="assassinCount" value="5" min="0" max="50">
        </div>
        <button id="startBtn">放蛐蛐進場！</button>
    </div>

    <div id="arena-container">
        <canvas id="arena" width="800" height="500"></canvas>
    </div>

    <div id="status-display">等待比賽開始...</div>

    <script>
        const canvas = document.getElementById('arena');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const statusDisplay = document.getElementById('status-display');

        let entities = [];
        let projectiles = [];
        let particles = []; // 用於視覺特效
        let gameActive = false;

        // 角色設定與屬性
        const CONFIG = {
            warrior: { color: '#ff4d4d', hp: 250, speed: 1.5, radius: 10, attackCd: 45, range: 35 },
            mage: { color: '#4da6ff', hp: 100, speed: 0.9, radius: 8, attackCd: 80, range: 250 },
            assassin: { color: '#4dff4d', hp: 130, speed: 2.2, radius: 9, attackCd: 90, range: 120 }
        };

        class Entity {
            constructor(x, y, type) {
                this.x = x;
                this.y = y;
                this.type = type;
                this.hp = CONFIG[type].hp;
                this.maxHp = CONFIG[type].hp;
                this.speed = CONFIG[type].speed;
                this.radius = CONFIG[type].radius;
                this.color = CONFIG[type].color;
                this.attackCd = 0;
                
                // 刺客專用特殊狀態
                this.isDashing = false;
                this.dashTimer = 0;
                this.dashTargetX = 0;
                this.dashTargetY = 0;
            }

            update() {
                if (this.attackCd > 0) this.attackCd--;

                // 尋找最近的「敵對」目標
                let target = this.findNearestEnemy();

                if (!target) return; // 沒敵人了，原地發呆

                let dist = Math.hypot(target.x - this.x, target.y - this.y);

                // --- 刺客突進邏輯 ---
                if (this.type === 'assassin' && this.isDashing) {
                    this.dashTimer--;
                    // 朝突進目標高速移動
                    let angle = Math.atan2(this.dashTargetY - this.y, this.dashTargetX - this.x);
                    this.x += Math.cos(angle) * (this.speed * 4);
                    this.y += Math.sin(angle) * (this.speed * 4);
                    
                    // 突進期間對撞到的敵人造成微量持續傷害
                    if (dist < this.radius + target.radius + 10) {
                        target.takeDamage(2);
                    }

                    if (this.dashTimer <= 0) this.isDashing = false;
                    this.clampPosition();
                    return;
                }

                // --- 各職業常規 AI 行为 ---
                if (this.type === 'warrior') {
                    // 戰士：無腦貼臉
                    let angle = Math.atan2(target.y - this.y, target.x - this.x);
                    this.x += Math.cos(angle) * this.speed;
                    this.y += Math.sin(angle) * this.speed;

                    // 範圍內揮刀攻擊
                    if (dist <= CONFIG.warrior.range && this.attackCd === 0) {
                        this.executeWarriorAttack();
                    }

                } else if (this.type === 'mage') {
                    // 法師：如果敵人太近就風箏逃跑，太遠就靠近，保持在輸出距離
                    let angle = Math.atan2(target.y - this.y, target.x - this.x);
                    if (dist < 100) {
                        // 逃跑
                        this.x -= Math.cos(angle) * this.speed;
                        this.y -= Math.sin(angle) * this.speed;
                    } else if (dist > CONFIG.mage.range - 50) {
                        // 靠近
                        this.x += Math.cos(angle) * this.speed;
                        this.y += Math.sin(angle) * this.speed;
                    }

                    // 遠程施法
                    if (dist <= CONFIG.mage.range && this.attackCd === 0) {
                        this.executeMageAttack(target);
                    }

                } else if (this.type === 'assassin') {
                    // 刺客：常規速度接近
                    let angle = Math.atan2(target.y - this.y, target.x - this.x);
                    this.x += Math.cos(angle) * this.speed;
                    this.y += Math.sin(angle) * this.speed;

                    // 觸發致命突進
                    if (dist <= CONFIG.assassin.range && this.attackCd === 0) {
                        this.executeAssassinAttack(target);
                    }
                }

                this.clampPosition();
            }

            // 確保不會走出邊界
            clampPosition() {
                this.x = Math.max(this.radius, Math.min(canvas.width - this.radius, this.x));
                this.y = Math.max(this.radius, Math.min(canvas.height - this.radius, this.y));
            }

            findNearestEnemy() {
                let nearest = null;
                let minDist = Infinity;
                for (let ent of entities) {
                    if (ent.type === this.type) continue; // 同陣營不打
                    let dist = Math.hypot(ent.x - this.x, ent.y - this.y);
                    if (dist < minDist) {
                        minDist = dist;
                        nearest = ent;
                    }
                }
                return nearest;
            }

            // 戰士攻擊：圓形近戰橫掃
            executeWarriorAttack() {
                this.attackCd = CONFIG.warrior.attackCd;
                // 產生環形打擊特效
                particles.push({ x: this.x, y: this.y, r: this.radius, maxR: CONFIG.warrior.range + 10, color: 'rgba(255, 77, 77, 0.4)', type: 'shockwave' });
                
                // 對範圍內所有敵人造成傷害
                for (let ent of entities) {
                    if (ent.type === this.type) continue;
                    let dist = Math.hypot(ent.x - this.x, ent.y - this.y);
                    if (dist <= CONFIG.warrior.range + ent.radius) {
                        ent.takeDamage(40);
                    }
                }
            }

            // 法師攻擊：發射追蹤魔法彈
            executeMageAttack(target) {
                this.attackCd = CONFIG.mage.attackCd;
                let angle = Math.atan2(target.y - this.y, target.x - this.x);
                projectiles.push({
                    x: this.x,
                    y: this.y,
                    vx: Math.cos(angle) * 4,
                    vy: Math.sin(angle) * 4,
                    target: target,
                    damage: 50,
                    color: '#4da6ff',
                    radius: 4,
                    type: 'magic'
                });
            }

            // 刺客攻擊：瞬間化為殘影發動爆發突進
            executeAssassinAttack(target) {
                this.attackCd = CONFIG.assassin.attackCd;
                this.isDashing = true;
                this.dashTimer = 15; // 突進持續15幀
                this.dashTargetX = target.x;
                this.dashTargetY = target.y;
                
                // 瞬間給予目標一擊重擊
                target.takeDamage(35);
                
                // 產生殘影粒子
                for (let i = 0; i < 5; i++) {
                    particles.push({
                        x: this.x + (Math.random() - 0.5) * 10,
                        y: this.y + (Math.random() - 0.5) * 10,
                        vx: 0, vy: 0, life: 20, maxLife: 20, color: 'rgba(77, 255, 77, 0.5)', type: 'trail'
                    });
                }
            }

            takeDamage(amount) {
                this.hp -= amount;
                // 受傷噴濺粒子效果
                particles.push({
                    x: this.x, y: this.y,
                    vx: (Math.random() - 0.5) * 4,
                    vy: (Math.random() - 0.5) * 4,
                    life: 15, maxLife: 15, color: this.color, type: 'spark'
                });
            }

            draw() {
                // 畫本體
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.fill();
                ctx.shadowBlur = 0; // 重設發光

                // 畫血條背景
                ctx.fillStyle = '#444';
                ctx.fillRect(this.x - 12, this.y - this.radius - 8, 24, 4);
                // 畫實際血量
                ctx.fillStyle = '#00ff00';
                let hpPercent = Math.max(0, this.hp / this.maxHp);
                ctx.fillRect(this.x - 12, this.y - this.radius - 8, 24 * hpPercent, 4);

                // 如果刺客在突進，畫個外圈
                if (this.isDashing) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius + 4, 0, Math.PI * 2);
                    ctx.strokeStyle = 'rgba(77, 255, 77, 0.6)';
                    ctx.stroke();
                }
            }
        }

        // 初始化遊戲
        function setupGame() {
            entities = [];
            projectiles = [];
            particles = [];
            
            const wCount = parseInt(document.getElementById('warriorCount').value) || 0;
            const mCount = parseInt(document.getElementById('mageCount').value) || 0;
            const aCount = parseInt(document.getElementById('assassinCount').value) || 0;

            // 隨機在畫布內生成各個陣營角色
            spawnEntities(wCount, 'warrior');
            spawnEntities(mCount, 'mage');
            spawnEntities(aCount, 'assassin');

            gameActive = true;
            statusDisplay.innerText = "激戰中...";
        }

        function spawnEntities(count, type) {
            for (let i = 0; i < count; i++) {
                let x = Math.random() * (canvas.width - 40) + 20;
                let y = Math.random() * (canvas.height - 40) + 20;
                entities.push(new Entity(x, y, type));
            }
        }

        // 遊戲核心循環
        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (gameActive) {
                // 1. 更新與繪製角色
                for (let i = entities.length - 1; i >= 0; i--) {
                    let ent = entities[i];
                    ent.update();
                    if (ent.hp <= 0) {
                        entities.splice(i, 1); // 死亡移除
                        continue;
                    }
                    ent.draw();
                }

                // 2. 更新與繪製法師法術飛行物
                for (let i = projectiles.length - 1; i >= 0; i--) {
                    let p = projectiles[i];
                    
                    // 如果目標還活著，法術會帶有微弱的自動追蹤效果
                    if (entities.includes(p.target)) {
                        let angle = Math.atan2(p.target.y - p.y, p.target.x - p.x);
                        p.vx = p.vx * 0.8 + Math.cos(angle) * 4 * 0.2;
                        p.vy = p.vy * 0.8 + Math.sin(angle) * 4 * 0.2;
                    }

                    p.x += p.vx;
                    p.y += p.vy;

                    // 繪製飛彈
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.fillStyle = p.color;
                    ctx.shadowBlur = 8;
                    ctx.shadowColor = p.color;
                    ctx.fill();
                    ctx.shadowBlur = 0;

                    // 檢查碰撞目標
                    if (entities.includes(p.target)) {
                        let dist = Math.hypot(p.target.x - p.x, p.target.y - p.y);
                        if (dist <= p.target.radius + p.radius) {
                            p.target.takeDamage(p.damage);
                            projectiles.splice(i, 1);
                            continue;
                        }
                    }

                    // 超出畫布外就移除
                    if (p.x < 0 || p.x > canvas.width || p.y < 0 || p.y > canvas.height) {
                        projectiles.splice(i, 1);
                    }
                }

                // 3. 處理視覺粒子特效（橫掃波、受傷火花等）
                for (let i = particles.length - 1; i >= 0; i--) {
                    let pt = particles[i];
                    if (pt.type === 'shockwave') {
                        pt.r += 2;
                        ctx.beginPath();
                        ctx.arc(pt.x, pt.y, pt.r, 0, Math.PI * 2);
                        ctx.strokeStyle = pt.color;
                        ctx.lineWidth = 2;
                        ctx.stroke();
                        if (pt.r >= pt.maxR) particles.splice(i, 1);
                    } else if (pt.type === 'spark' || pt.type === 'trail') {
                        pt.x += pt.vx;
                        pt.y += pt.vy;
                        pt.life--;
                        ctx.beginPath();
                        ctx.arc(pt.x, pt.y, pt.type === 'trail' ? 6 : 2, 0, Math.PI * 2);
                        ctx.fillStyle = pt.color;
                        ctx.fill();
                        if (pt.life <= 0) particles.splice(i, 1);
                    }
                }

                // 4. 判定勝負
                checkWinCondition();
            }

            requestAnimationFrame(gameLoop);
        }

        function checkWinCondition() {
            let aliveTypes = new Set(entities.map(e => e.type));
            
            // 算一下剩餘人數
            let counts = { warrior: 0, mage: 0, assassin: 0 };
            entities.forEach(e => counts[e.type]++);

            statusDisplay.innerHTML = `
                剩餘數量 -> 
                <span style="color:#ff4d4d">戰士: ${counts.warrior}</span> | 
                <span style="color:#4da6ff">法師: ${counts.mage}</span> | 
                <span style="color:#4dff4d">刺客: ${counts.assassin}</span>
            `;

            if (aliveTypes.size === 1 && gameActive) {
                let winner = [...aliveTypes][0];
                let winnerName = winner === 'warrior' ? '戰士 (紅隊)' : winner === 'mage' ? '法師 (藍隊)' : '刺客 (綠隊)';
                let winnerColor = CONFIG[winner].color;
                statusDisplay.innerHTML = <span style="color:${winnerColor}; font-size:24px;">👑 比赛结束！ 恭喜 ${winnerName} 勝出！👑</span>;
                gameActive = false;
            } else if (aliveTypes.size === 0 && gameActive) {
                statusDisplay.innerHTML = <span style="color:#aaa; font-size:24px;">💀 慘絕人寰！全軍覆沒，沒有贏家！💀</span>;
                gameActive = false;
            }
        }

        // 綁定按鈕點擊
        startBtn.addEventListener('click', setupGame);

        // 啟動動畫循環
        gameLoop();
    </script>
</body>
</html>
